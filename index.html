<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カレンダー</title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
</head>
<body>
    <div class="cal">
      <div class="cal_header">
         <div class="cal_arrow cal_prev"></div>
         <div class="cal_title">2026年5月</div>
         <div class="cal_arrow cal_next"></div>
      </div>

      <div class="cal_body">
        <table>
            <thread class="cal_weeks">
                <tr>
                    <th class="cal_week cal_week--sun">日</th>
                    <th class="cal_week">月</th>
                    <th class="cal_week">火</th>
                    <th class="cal_week">水</th>
                    <th class="cal_week">木</th>
                    <th class="cal_week">金</th>
                    <th class="cal_week cal_week--sat">土</th>
                </tr>
            </thread>
            <tbody class="cal_days">
                <tr>
                    <td class="cal_day cal_day--prev">26</td>
                    <td class="cal_day cal_day--prev">27</td>
                    <td class="cal_day cal_day--prev">28</td>
                    <td class="cal_day cal_day--prev">29</td>
                    <td class="cal_day cal_day--prev">30</td>
                    <td class="cal_day">1</td>
                    <td class="cal_day cal_day--sat">2</td>                    
                </tr>
                <tr>
                    <td class="cal_day cal_day--sun">3</td>
                    <td class="cal_day">4</td>
                    <td class="cal_day">5</td>
                    <td class="cal_day">6</td>
                    <td class="cal_day">7</td>
                    <td class="cal_day">8</td>
                    <td class="cal_day cal_day--sat">9</td>
                </tr>
                <tr>
                    <td class="cal_day cal_day--sun">10</td>
                    <td class="cal_day">11</td>
                    <td class="cal_day">12</td>
                    <td class="cal_day">13</td>
                    <td class="cal_day">14</td>
                    <td class="cal_day">15</td>
                    <td class="cal_day cal_day--sat">16</td>
                </tr>
                <tr>
                    <td class="cal_day cal_day--sun">17</td>
                    <td class="cal_day">18</td>
                    <td class="cal_day">19</td>
                    <td class="cal_day">20</td>
                    <td class="cal_day">21</td>
                    <td class="cal_day">22</td>
                    <td class="cal_day cal_day--sat">23</td>
                </tr>
                <tr>
                    <td class="cal_day cal_day--sun">24</td>
                    <td class="cal_day">25</td>
                    <td class="cal_day">26</td>
                    <td class="cal_day">27</td>
                    <td class="cal_day">28</td>
                    <td class="cal_day">29</td>
                    <td class="cal_day cal_day--sat">30</td>
                </tr>
                <tr>
                    <td class="cal_day cal_day--sun">31</td>
                </tr>

            </tbody>
        </table>
      </div>
    </div>
</body>
</html>
